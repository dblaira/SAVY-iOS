name: SAVY
options:
  bundleIdPrefix: com.adamblair
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 7FKUS5M5QS

targets:
  SAVY:
    type: application
    platform: iOS
    sources:
      - path: SAVY
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.adamblair.savy
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_CFBundleDisplayName: SAVY
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIUserInterfaceStyle: Light
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "SAVY uses location only when a native entry needs place context."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "SAVY lets you attach chosen images to native entries."
  SAVYTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SAVYTests
    dependencies:
      - target: SAVY
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.adamblair.savy.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/SAVY.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/SAVY"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  SAVY:
    build:
      targets:
        SAVY: all
        SAVYTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SAVYTests
